<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmación de Reserva</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #1E232C;
        }
        p {
            font-size: 16px;
            color: #333;
        }
        .qr-container {
            margin-top: 20px;
        }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Reserva confirmada!</h1>
        <p><strong>ID de Reserva:</strong> {{ id_reserva }}</p>
        <p><strong>Monto Total:</strong> ${{ monto_total }}</p>
        <p><strong>Fecha de Inicio:</strong> {{ fecha_inicio }}</p>
        <p><strong>Hora de Inicio:</strong> {{ hora_inicio }}</p>
        <p><strong>Ubicación:</strong> {{ nombre_parqueadero }}</p>

        <div class="qr-container">
            <p><strong>Código QR para tu reserva:</strong></p>
            <img src="cid:qr_reserva" alt="Código QR">
        </div>

        <hr>
        <p class="footer">© 2025 ParqueApp. Todos los derechos reservados.</p>
    </div>
</body>
</html>
