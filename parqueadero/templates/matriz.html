<!DOCTYPE html>
<html>
<head>
    <title>Matriz del Parqueadero</title>
    <style>
        table { border-collapse: collapse; }
        td {
            width: 80px;
            height: 60px;
            text-align: center;
            border: 1px solid black;
        }
        .Disponible { background-color: #c8e6c9; }      /* verde */
        .Ocupado { background-color: #ffcdd2; }        /* rojo */
        .Fuera_de_servicio { background-color: #e0e0e0; } /* gris */
    </style>
</head>
<body>
    <h1>Matriz del Parqueadero: {{ parqueadero.nombre }}</h1>
    <form method="POST">
        {% csrf_token %}
        <table>
            {% for fila in matriz %}
                <tr>
                    {% for celda in fila %}
                        <td class="{% if celda.estado == 'Disponible' %}Disponible{% elif celda.estado == 'Ocupado' %}Ocupado{% else %}Fuera_de_servicio{% endif %}">
                            <div>{{ celda.nombre }}</div>
                            <div>{{ celda.estado }}</div>
                        </td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </table>
    </form>
</body>
</html>
